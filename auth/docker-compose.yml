services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: pocketid
    restart: unless-stopped
    ports:
      - 1411:1411
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - APP_URL=https://pocketid.${TS_DOMAIN}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/pocketid:/app/data
    # Optional healthcheck
    healthcheck:
      test: ["CMD", "/app/pocket-id", "healthcheck"]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
    networks:
      - homelab

networks:
  homelab:
    external: true
