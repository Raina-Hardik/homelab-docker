services:
  # ── VPN Tunnel ───────────────────────────────────────────────────────────────
  # All qBittorrent traffic is forced through Gluetun (ProtonVPN).
  # qBittorrent shares Gluetun's network namespace — it has no network of its own.
  # Ports for the qBittorrent Web UI are published here on the Gluetun container.
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_PORT_FORWARDING=${VPN_PORT_FORWARDING}
      - VPN_PORT_FORWARDING_PROVIDER=${VPN_PORT_FORWARDING_PROVIDER}
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - TZ=${TZ}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/gluetun:/gluetun
    # Port 8080 is the qBittorrent Web UI — exposed here since qBittorrent shares
    # this container's network. Remove the host-port once Caddy is routing to it.
    ports:
      - "6881:6881"
      - "6881:6881/udp"
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[g]luetun'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - homelab

  # ── Torrent Client ────────────────────────────────────────────────────────────
  # network_mode: service:gluetun forces ALL traffic through the VPN tunnel.
  # Do NOT add this service to the homelab network — it has no independent network.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/qbittorrent:/config
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/downloads:/downloads
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/anime:/anime
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[q]bittorrent-nox'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Media Server ──────────────────────────────────────────────────────────────
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    # Intel Quick Sync passthrough (works on 12th gen iGPU via /dev/dri)
    devices:
      - /dev/dri:/dev/dri
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - DOTNET_SYSTEM_NET_DISABLEIPV6=1
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/jellyfin:/config
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/tv:/data/tvshows
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/movies:/data/movies
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/anime:/data/movies/anime
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[j]ellyfin'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - homelab

  # ── Anime Client/Server ─────────────────────────────────────────────────────
  # Community-maintained image recommended by Seanime docs for self-hosting.
  # Exposed internally on the homelab network and published through Caddy.
  seanime:
    image: umagistr/seanime:latest-hwaccel
    container_name: seanime
    user: "${PUID}:${PGID}"
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    environment:
      - TZ=${TZ}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/seanime:/home/seanime/.config/Seanime
      - ./seanime.config.toml:/home/seanime/.config/Seanime/config.toml
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media:/anime
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/downloads:/downloads
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:43211 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - homelab

  # ── Automation ────────────────────────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/sonarr:/config
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/tv:/tv
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/downloads:/downloads
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[S]onarr'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - homelab

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/radarr:/config
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/movies:/movies
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/downloads:/downloads
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[R]adarr'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - homelab

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun" # route through VPN
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/prowlarr:/config
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[P]rowlarr'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Music Management ──────────────────────────────────────────────────────────
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/lidarr:/config
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/music:/music
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/downloads:/downloads
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[L]idarr'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - homelab

  # ── Music Server ──────────────────────────────────────────────────────────────
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: "${PUID}:${PGID}"
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/navidrome:/data
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/music:/music:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4533 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - homelab

  # ── Music Player UI ───────────────────────────────────────────────────────────
  # Feishin is a web player for Navidrome. Connects to navidrome:4533 internally.
  feishin:
    image: ghcr.io/jeffvli/feishin:latest
    container_name: feishin
    restart: unless-stopped
    environment:
      - SERVER_TYPE=navidrome
      - SERVER_URL=http://navidrome:4533
      - SERVER_NAME=navidrome
      - SERVER_LOCK=true
      - ANALYTICS_DISABLED=true
      - TZ=${TZ}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9180 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - homelab
    depends_on:
      - navidrome

networks:
  homelab:
    external: true
