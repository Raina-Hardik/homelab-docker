services:
  # ── Immich ────────────────────────────────────────────────────────────────────
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    depends_on:
      immich-db:
        condition: service_healthy
      immich-redis:
        condition: service_healthy
    environment:
      - TZ=${TZ}
      - DB_HOSTNAME=immich-db
      - DB_USERNAME=immich
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/immich/upload:/usr/src/app/upload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2283/server-info/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - homelab

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    restart: unless-stopped
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/immich/model-cache:/cache
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:3003/ping\")'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - homelab

  immich-redis:
    image: redis:6.2-alpine
    container_name: immich-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - homelab

  immich-db:
    # pgvecto-rs is required by Immich for vector similarity search (smart search / faces)
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    container_name: immich-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=immich
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_DB=immich
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/immich/db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U immich -d immich" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - homelab

  # ── Nextcloud ─────────────────────────────────────────────────────────────────
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    depends_on:
      nextcloud-db:
        condition: service_healthy
      immich-redis:
        condition: service_healthy
    environment:
      - TZ=${TZ}
      - MYSQL_HOST=nextcloud-db
      - MYSQL_DATABASE=${NEXTCLOUD_MYSQL_DATABASE}
      - MYSQL_USER=${NEXTCLOUD_MYSQL_USER}
      - MYSQL_PASSWORD=${NEXTCLOUD_MYSQL_PASSWORD}
      - REDIS_HOST=immich-redis
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.${TS_DOMAIN}
      # Caddy talks to Nextcloud from the Docker bridge network. Trust that RFC1918
      # proxy range and pin the public-facing URL values so links and redirects are
      # always generated correctly over HTTPS.
      - TRUSTED_PROXIES=172.16.0.0/12
      - OVERWRITEHOST=nextcloud.${TS_DOMAIN}
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://nextcloud.${TS_DOMAIN}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/nextcloud:/var/www/html
    healthcheck:
      test: [ "CMD-SHELL", "php occ status >/dev/null 2>&1" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    networks:
      - homelab

  nextcloud-db:
    image: mariadb:11
    container_name: nextcloud-db
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    environment:
      - MYSQL_ROOT_PASSWORD=${NEXTCLOUD_MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${NEXTCLOUD_MYSQL_DATABASE}
      - MYSQL_USER=${NEXTCLOUD_MYSQL_USER}
      - MYSQL_PASSWORD=${NEXTCLOUD_MYSQL_PASSWORD}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/nextcloud-db:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "healthcheck.sh --connect --innodb_initialized" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - homelab

networks:
  homelab:
    external: true
