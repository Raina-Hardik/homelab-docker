services:
  # ── Beszel Hub ────────────────────────────────────────────────────────────────
  # The hub stores metrics and serves the web UI on port 8090.
  # After first boot, open the UI, add a system, and copy the generated public key
  # into BESZEL_KEY in your .env, then restart beszel-agent.
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/beszel:/beszel_data
    # Allows the hub to reach the agent running on the host network at port 45876
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8090:8090"
    healthcheck:
      test: [ "CMD-SHELL", "ps -ef | grep -q '[b]eszel'" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - homelab

  # ── Beszel Agent ──────────────────────────────────────────────────────────────
  # Runs with host networking to accurately report network interfaces and host-level
  # CPU/RAM/disk stats. The hub connects to it at host.docker.internal:45876.
  # In the Beszel UI, add the system with address: host.docker.internal:45876
  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LISTEN=0.0.0.0:45876
      # KEY is the public key generated by the Beszel Hub when you add a system.
      # Leave blank on first boot, then populate after getting the key from the UI.
      - KEY=${BESZEL_KEY}
      - TOKEN=${BESZEL_KEY}
      - HUB_URL=http://host.docker.internal:8090
    healthcheck:
      test: [ "CMD-SHELL", "ps -ef | grep -q '[b]eszel-agent'" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Dozzle ────────────────────────────────────────────────────────────────────
  # Real-time log viewer for all Docker containers. Read-only Docker socket access.
  # No data is stored — open the UI to see live logs from any running container.
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: [ "CMD-SHELL", "ps -ef | grep -q '[d]ozzle'" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - homelab

  # ── Uptime Kuma ───────────────────────────────────────────────────────────────
  # External uptime monitoring. Add monitors via the UI after first boot.
  # Supports alerts to Discord, Telegram, ntfy, webhooks, and ~90 other targets.
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/uptime-kuma:/app/data
    healthcheck:
      test: [ "CMD-SHELL", "ps -ef | grep -q '[u]ptime-kuma'" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - homelab

networks:
  homelab:
    external: true
