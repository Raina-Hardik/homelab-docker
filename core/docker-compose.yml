services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/adguard/work:/opt/adguardhome/work
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/adguard/conf:/opt/adguardhome/conf
    ports:
      - "${ADGUARD_DNS_PORT_TCP:-53}:53/tcp"
      - "${ADGUARD_DNS_PORT_UDP:-53}:53/udp"
    environment:
      - TZ=${TZ}
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[A]dGuardHome'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - homelab

  caddy:
    image: ghcr.io/tailscale/caddy-tailscale:main
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/caddy/data:/data
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/caddy/config:/config
      - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock
    environment:
      - TZ=${TZ}
      - TS_TAGS=${TS_TAG:-tag:homelab}
      - TS_DOMAIN=${TS_DOMAIN}
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TSNET_FORCE_LOGIN=1
      - LOCAL_DOMAIN=${LOCAL_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    depends_on:
      adguard:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - homelab

  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: unless-stopped
    depends_on:
      caddy:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/homarr/appdata:/appdata
    environment:
      - TZ=${TZ}
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_ENCRYPTION_KEY}
    networks:
      - homelab
networks:
  homelab:
    external: true
