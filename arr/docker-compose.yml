services:
  # ── VPN Tunnel ───────────────────────────────────────────────────────────────
  # All qBittorrent traffic is forced through Gluetun (ProtonVPN).
  # qBittorrent shares Gluetun's network namespace — it has no network of its own.
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_PORT_FORWARDING=${VPN_PORT_FORWARDING}
      - VPN_PORT_FORWARDING_PROVIDER=${VPN_PORT_FORWARDING_PROVIDER}
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -O- --retry-connrefused --post-data "json={\"listen_port\":{{PORTS}}}" http://127.0.0.1:8080/api/v2/app/setPreferences'
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - TZ=${TZ}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/gluetun:/gluetun
    ports:
      - "6881:6881"
      - "6881:6881/udp"
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[g]luetun'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - homelab

  # ── Torrent Client ────────────────────────────────────────────────────────────
  # network_mode: service:gluetun forces ALL traffic through the VPN tunnel.
  # Do NOT add this service to the homelab network — it has no independent network.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/qbittorrent:/config
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/downloads:/downloads
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/anime:/anime
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[q]bittorrent-nox'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Automation ────────────────────────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/sonarr:/config
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/tv:/tv
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/downloads:/downloads
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[S]onarr'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - homelab

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/radarr:/config
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/movies:/movies
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/downloads:/downloads
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[R]adarr'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - homelab

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun" # route through VPN
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/prowlarr:/config
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[P]rowlarr'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Media Request Manager ─────────────────────────────────────────────────────
  # Seerr is the single entry point for media requests. Direct Tailscale routes
  # for Sonarr and Radarr are removed from the Caddyfile — access only via Seerr.
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    user: root
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
      - TMDB_API_KEY=${TMDB_API_KEY}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/seerr:/app/config
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/seerr/themoviedb-index.js:/app/dist/api/themoviedb/index.js:ro
    dns:
      - 9.9.9.9 # Quad9
      - 1.1.1.1 # Cloudflare
      - 8.8.8.8 # Google
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider
            http://localhost:5055/api/v1/settings/public || exit 1",
        ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s
    networks:
      - homelab

  # ── Cloudflare Bypass ────────────────────────────────────────────────────────
  # FlareSolverr proxies requests through a headless browser to bypass Cloudflare
  # protection. Prowlarr uses it via Settings → Indexers → Add FlareSolverr proxy,
  # pointing to http://flaresolverr:8191.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8191/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - homelab

  # ── Transcoding / Re-encoding ─────────────────────────────────────────────────
  # Tdarr watches your libraries and re-encodes content to H.265 at ≤1080p.
  # internalNode=true runs the worker node inside the same container as the server.
  # GPU transcoding uses Intel Quick Sync via /dev/dri (VA-API), consistent with
  # Jellyfin and Seanime in the media stack.
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    restart: unless-stopped
    # Intel iGPU passthrough (VA-API / Quick Sync)
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - ${RENDER_GID:-39}
      - ${VIDEO_GID:-105}
    environment:
      - TZ=${TZ}
      - UMASK_SET=002
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - inContainer=true
      - ffmpegVersion=7
      - nodeName=InternalNode
      - openBrowser=false
      - maxLogSizeMB=10
      - cronPluginUpdate=
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/tdarr/server:/app/server
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/tdarr/configs:/app/configs
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/tdarr/logs:/app/logs
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/tdarr/cache:/temp
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/tv:/media/tv
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/movies:/media/movies
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/music:/media/music
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/media/anime:/media/anime
    ports:
      - "8266:8266" # Server / node comms (required for external nodes)
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8265 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - homelab

networks:
  homelab:
    external: true

