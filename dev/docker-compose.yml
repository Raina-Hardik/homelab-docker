services:
  # ── Forgejo ───────────────────────────────────────────────────────────────────
  forgejo:
    image: codeberg.org/forgejo/forgejo:15
    container_name: forgejo
    restart: unless-stopped
    ports:
      # Git-over-SSH from the host on a non-conflicting port; keep host SSH on 22.
      - "2222:22"
    environment:
      - USER_UID=${PUID}
      - USER_GID=${PGID}
      - TZ=${TZ}
      - GITEA__server__PROTOCOL=http
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__DOMAIN=forgejo.${TS_DOMAIN}
      - GITEA__server__ROOT_URL=https://forgejo.${TS_DOMAIN}
      - GITEA__server__SSH_DOMAIN=forgejo.${TS_DOMAIN}
      - GITEA__server__SSH_PORT=2222
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/forgejo:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:3000/api/healthz || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - homelab

  # ── Forgejo Act Runner ────────────────────────────────────────────────────────
  # Self-hosted runner scoped to your Forgejo instance. Runs CI/CD workflows
  # defined in .forgejo/workflows/ (compatible with GitHub Actions YAML syntax).
  #
  # FORGEJO_RUNNER_TOKEN: generate a registration token from:
  # Forgejo → Site Admin → Actions → Runners → Create Runner
  # The token is single-use. Regenerate if registration fails.
  forgejo-runner:
    image: code.forgejo.org/forgejo/runner:6
    container_name: forgejo-runner
    profiles: ["runner"]
    user: "0:0"
    restart: unless-stopped
    depends_on:
      forgejo:
        condition: service_healthy
    environment:
      - FORGEJO_INSTANCE_URL=https://forgejo.${TS_DOMAIN}
      - FORGEJO_RUNNER_REGISTRATION_TOKEN=${FORGEJO_RUNNER_TOKEN}
      - FORGEJO_RUNNER_NAME=${FORGEJO_RUNNER_NAME:-homelab-runner}
      - FORGEJO_RUNNER_LABELS=homelab,self-hosted,linux,x64
      - TZ=${TZ}
    volumes:
      - ${HOST_MOUNT_ROOT:-/mnt/docker}/forgejo-runner:/data
      # Docker socket lets the runner build and push images without DinD
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - homelab

networks:
  homelab:
    external: true
